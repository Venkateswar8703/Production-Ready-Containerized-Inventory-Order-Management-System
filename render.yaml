services:
  # Database Service (PostgreSQL)
  - type: db
    name: stockflow-db
    databaseName: inventory_db
    user: postgres
    plan: free

  # Backend API Service (FastAPI)
  - type: web
    name: stockflow-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: PROJECT_NAME
        value: "StockFlow API"
